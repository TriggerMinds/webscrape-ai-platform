version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-n8n_password}
      POSTGRES_DB: ${DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-n8n} -d ${DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_DATABASE_TYPE: postgresdb
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-n8n_password}
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?err}
      N8N_METRICS: false
      N8N_AI_ENABLED: true
      N8N_AI_LANGCHAIN_ENABLED: true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/backup
    ports:
      - "${N8N_PORT:-5678}:5678"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  crawlee-api:
    build:
      context: ./crawlee-api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: ${CRAWLEE_PORT:-3001}
      PROXY_URL: ${PROXY_URL:-socks5://127.0.0.1:1080}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-3}
      NODE_ENV: production
    ports:
      - "${CRAWLEE_PORT:-3001}:3001"

volumes:
  postgres_data:
  n8n_data:
