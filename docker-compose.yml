version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-n8n_password}
      POSTGRES_DB: ${DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-n8n} -d ${DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_DATABASE_TYPE: postgresdb
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-n8n_password}
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-n8n}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?err}
      N8N_METRICS: false
      N8N_AI_ENABLED: true
      N8N_AI_LANGCHAIN_ENABLED: true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/backup
    ports:
      - "${N8N_PORT:-5678}:5678"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  crawlee-api:
    build:
      context: ./crawlee-api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${CRAWLEE_PORT:-3001}
      PROXY_URL: ${PROXY_URL}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-3}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-n8n}
      DB_PASSWORD: ${DB_PASSWORD:-n8n_password}
      DB_NAME: ${DB_NAME:-n8n}
      NODE_ENV: production
    ports:
      - "${CRAWLEE_PORT:-3001}:3001"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Optional: Traefik reverse-proxy for HTTPS
  # Uncomment and configure your domain + Let's Encrypt email below.
  #
  # traefik:
  #   image: traefik:v3.0
  #   restart: unless-stopped
  #   command:
  #     - "--providers.docker=true"
  #     - "--providers.docker.exposedbydefault=false"
  #     - "--entrypoints.websecure.address=:443"
  #     - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
  #     - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
  #     - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - "/var/run/docker.sock:/var/run/docker.sock:ro"
  #     - "traefik_data:/letsencrypt"
  #   logging: *default-logging
  #
  # To expose n8n and crawlee-api behind Traefik, add labels to each service:
  #
  #   labels:
  #     - "traefik.enable=true"
